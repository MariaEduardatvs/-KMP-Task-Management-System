<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Management System</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous">
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<header>
        <nav class="navbar navbar-dark bg-dark fixed-top custom-nav">  
            <div class="container-fluid">
                <a class="navbar-brand text-warning fw-bold" href="index.html">KMP Task Manager</a>
                
                <div class="d-none d-lg-block">
                    <ul class="d-inline-flex mb-0 list-unstyled">
                        <li class="nav-item me-3">
                            <a class="nav-link btn btn-warning p-2 text-dark fw-bold" href="index.html">Home</a>
                        </li>
                        <li class="nav-item me-3">
                            <a class="nav-link btn btn-outline-warning p-2 text-white" href="task.html">Create Task</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4 text-light">Task Management System</h1>
        
        <div class="card form-card p-3">
            <form id="taskForm">
                <div class="mb-3">
                    <label for="taskName" class="form-label text-light">Task name</label>
                    <input type="text" class="form-control custom-input" id="taskName" required>
                </div>
                <div class="mb-3">
                    <label for="taskDescription" class="form-label text-light">Task description</label>
                    <textarea class="form-control custom-input" id="taskDescription" rows="3" required></textarea>
                </div>
                <button type="submit" class="btn btn-warning fw-bold text-dark">Add Task</button>
            </form>
        </div>

        <h2 class="mt-5 text-light">Task list:</h2>
        <ul id="taskList" class="list-group mt-3"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
